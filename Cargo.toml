[workspace]
members = [
  "crates/core",
  "crates/bot",
  "crates/persistence-mongo",
  "crates/modules/info",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"
authors = ["MARU"]

[workspace.dependencies]
anyhow = "1.0.100"
poise = "0.6.1"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "signal"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "fmt"] }
